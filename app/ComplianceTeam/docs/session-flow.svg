<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#222"/>
    </marker>
    <marker id="arrowReturn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
    <linearGradient id="bgPlan" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ec"/>
      <stop offset="1" stop-color="#fde7c2"/>
    </linearGradient>
    <linearGradient id="bgReview" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="1" stop-color="#cee0fb"/>
    </linearGradient>
    <linearGradient id="bgMcp" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f3eaff"/>
      <stop offset="1" stop-color="#dec8fa"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="740" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a1a">ComplianceTeam — session flow &amp; FERPA's changes to the plan</text>
  <text x="740" y="62" text-anchor="middle" font-size="12" fill="#666">Trace 5571978f6f6077c8eaf20a4b869bffdc · ComplianceTeam · 2026-05-06 10:51 · 1× standards_partner, 21× Educore MCP, 1× ferpa_review</text>

  <!-- ============== LANES ============== -->
  <!-- Lane: User -->
  <rect x="30" y="90" width="220" height="50" rx="8" fill="#1a1a1a"/>
  <text x="140" y="120" text-anchor="middle" fill="#fff" font-weight="700">User</text>

  <!-- Lane: ComplianceTeam -->
  <rect x="280" y="90" width="280" height="50" rx="8" fill="#0d6efd"/>
  <text x="420" y="115" text-anchor="middle" fill="#fff" font-weight="700">ComplianceTeam (orchestrator)</text>
  <text x="420" y="131" text-anchor="middle" fill="#dbe8ff" font-size="11">Strands Agent · Bedrock Sonnet 4.5 · ASGI</text>

  <!-- Lane: StandardsPartner -->
  <rect x="590" y="90" width="280" height="50" rx="8" fill="#b15a00"/>
  <text x="730" y="115" text-anchor="middle" fill="#fff" font-weight="700">standards_partner (sub-agent)</text>
  <text x="730" y="131" text-anchor="middle" fill="#fdebd0" font-size="11">Strands Agent + Educore MCPClient</text>

  <!-- Lane: Educore MCP -->
  <rect x="900" y="90" width="260" height="50" rx="8" fill="#6f42c1"/>
  <text x="1030" y="115" text-anchor="middle" fill="#fff" font-weight="700">Educore MCP</text>
  <text x="1030" y="131" text-anchor="middle" fill="#e7d6ff" font-size="11">https://educore.tqtmp.org/mcp</text>

  <!-- Lane: FERPA -->
  <rect x="1190" y="90" width="260" height="50" rx="8" fill="#198754"/>
  <text x="1320" y="115" text-anchor="middle" fill="#fff" font-weight="700">ferpa_review (sub-agent)</text>
  <text x="1320" y="131" text-anchor="middle" fill="#d8f0e2" font-size="11">FERPA reviewer · 34 CFR Part 99</text>

  <!-- Lifelines -->
  <line x1="140" y1="140" x2="140" y2="780" stroke="#bbb" stroke-dasharray="4 4"/>
  <line x1="420" y1="140" x2="420" y2="780" stroke="#bbb" stroke-dasharray="4 4"/>
  <line x1="730" y1="140" x2="730" y2="780" stroke="#bbb" stroke-dasharray="4 4"/>
  <line x1="1030" y1="140" x2="1030" y2="780" stroke="#bbb" stroke-dasharray="4 4"/>
  <line x1="1320" y1="140" x2="1320" y2="780" stroke="#bbb" stroke-dasharray="4 4"/>

  <!-- ============== SEQUENCE ============== -->

  <!-- 1. user prompt -->
  <g>
    <line x1="140" y1="180" x2="416" y2="180" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="278" y="173" text-anchor="middle" fill="#222" font-size="12" font-weight="600">1 · POST /invocations</text>
    <text x="278" y="195" text-anchor="middle" fill="#444" font-size="11">"Compare CLR vs CTDL for PII… draft an implementation plan."</text>
  </g>

  <!-- 2. orchestrator → standards_partner -->
  <g>
    <line x1="420" y1="240" x2="726" y2="240" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="573" y="233" text-anchor="middle" fill="#222" font-size="12" font-weight="600">2 · execute_tool standards_partner(prompt=…)</text>
    <text x="573" y="255" text-anchor="middle" fill="#444" font-size="11">step 1 of mandatory workflow — get the plan</text>
  </g>

  <!-- 3. MCP fan-out -->
  <g>
    <line x1="730" y1="305" x2="1026" y2="305" stroke="#6f42c1" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="878" y="298" text-anchor="middle" fill="#6f42c1" font-size="12" font-weight="600">3 · 1× tools/list · 1× getSchema · 20× cypherQuery</text>
    <line x1="1030" y1="335" x2="734" y2="335" stroke="#6f42c1" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrowReturn)"/>
    <text x="878" y="328" text-anchor="middle" fill="#6f42c1" font-size="11">CLR / CTDL / IdentityObject / Profile / etc.</text>
  </g>

  <!-- 4. standards_partner returns plan -->
  <g>
    <line x1="730" y1="395" x2="424" y2="395" stroke="#666" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrowReturn)"/>
    <text x="577" y="388" text-anchor="middle" fill="#444" font-size="12" font-weight="600">4 · plan returned (~24 KB Markdown)</text>
    <text x="577" y="410" text-anchor="middle" fill="#444" font-size="11">CLR + CTDL dual-standard system, hashed IdentityObject, selective disclosure, digital wallets, consent logging</text>
  </g>

  <!-- Plan summary card on StandardsPartner side -->
  <g transform="translate(590,440)">
    <rect width="280" height="180" rx="10" fill="url(#bgPlan)" stroke="#b15a00"/>
    <text x="140" y="20" text-anchor="middle" font-weight="700" fill="#5a2e00">StandardsPartner plan (initial)</text>
    <text x="14" y="44" fill="#333">• CTDL → public catalog metadata (no PII)</text>
    <text x="14" y="64" fill="#333">• CLR → individual learner records w/ PII</text>
    <text x="14" y="84" fill="#333">• Hash + salt IdentityObject; W3C VC proofs</text>
    <text x="14" y="104" fill="#333">• Selective disclosure via `partial`</text>
    <text x="14" y="124" fill="#333">• Holder-controlled wallet sharing</text>
    <text x="14" y="144" fill="#333">• ConsentRecord + AuditLogEntry tables</text>
    <text x="14" y="164" fill="#666" font-style="italic">Strong privacy primitives — but FERPA-specific gaps.</text>
  </g>

  <!-- 5. orchestrator → ferpa_review (with plan verbatim) -->
  <g>
    <line x1="420" y1="660" x2="1316" y2="660" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="868" y="653" text-anchor="middle" fill="#222" font-size="12" font-weight="600">5 · execute_tool ferpa_review(plan=⟨verbatim plan⟩)</text>
    <text x="868" y="675" text-anchor="middle" fill="#444" font-size="11">step 2 of mandatory workflow — review the plan</text>
  </g>

  <!-- 6. ferpa returns review -->
  <g>
    <line x1="1320" y1="730" x2="424" y2="730" stroke="#666" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrowReturn)"/>
    <text x="868" y="723" text-anchor="middle" fill="#444" font-size="12" font-weight="600">6 · review returned (~16 KB Markdown)</text>
    <text x="868" y="747" text-anchor="middle" fill="#444" font-size="11">verdict + 7 findings + open questions + out-of-scope</text>
  </g>

  <!-- 7. final delivery to user -->
  <g>
    <line x1="420" y1="800" x2="144" y2="800" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="282" y="793" text-anchor="middle" fill="#222" font-size="12" font-weight="600">7 · final response (Plan + Review + Team Summary)</text>
  </g>

  <!-- ============== BEFORE / AFTER PANEL ============== -->
  <g transform="translate(30,840)">
    <rect width="1420" height="480" rx="14" fill="#fafafa" stroke="#ddd"/>
    <text x="20" y="34" font-size="20" font-weight="700" fill="#1a1a1a">How FERPA changed the StandardsPartner plan</text>
    <text x="20" y="56" font-size="13" fill="#444">Verdict: <tspan font-weight="700" fill="#a06600">PASS WITH CONDITIONS</tspan> · 2 items confirmed correct (Info) · 4 Major/Blocker fixes required before shipping.</text>

    <!-- Findings columns -->
    <!-- Card template: x, y, severity, citation, before, after, color -->
    <!-- Row 1 -->
    <g transform="translate(20,80)">
      <rect width="450" height="180" rx="10" fill="#fff" stroke="#c0392b"/>
      <rect width="450" height="28" rx="10" fill="#c0392b"/>
      <text x="12" y="20" fill="#fff" font-weight="700">BLOCKER · 34 CFR 99.30(a) — Consent content</text>
      <text x="12" y="50" font-weight="700" fill="#444">Before:</text>
      <text x="12" y="68" fill="#333">ConsentRecord captures purpose &amp; timestamps.</text>
      <text x="12" y="86" fill="#333">No assertion that the UI captures the FERPA</text>
      <text x="12" y="104" fill="#333">trio (records · purpose · recipient).</text>
      <text x="12" y="130" font-weight="700" fill="#0a7a2c">After (FERPA required):</text>
      <text x="12" y="148" fill="#333">UI must capture (a) record/claim IDs in</text>
      <text x="12" y="166" fill="#333">student-friendly text, (b) purpose, (c) verifier identity.</text>
    </g>

    <g transform="translate(485,80)">
      <rect width="450" height="180" rx="10" fill="#fff" stroke="#c0392b"/>
      <rect width="450" height="28" rx="10" fill="#c0392b"/>
      <text x="12" y="20" fill="#fff" font-weight="700">BLOCKER · 34 CFR 99.31(a)(1) — School-official policy</text>
      <text x="12" y="50" font-weight="700" fill="#444">Before:</text>
      <text x="12" y="68" fill="#333">"Faculty see only own advisees" via internal API,</text>
      <text x="12" y="86" fill="#333">but no written definition of "legitimate</text>
      <text x="12" y="104" fill="#333">educational interest" or RBAC detail.</text>
      <text x="12" y="130" font-weight="700" fill="#0a7a2c">After (FERPA required):</text>
      <text x="12" y="148" fill="#333">Written school-official + LEI policy, RBAC with</text>
      <text x="12" y="166" fill="#333">audit logging on internal SIS API access.</text>
    </g>

    <g transform="translate(950,80)">
      <rect width="450" height="180" rx="10" fill="#fff" stroke="#c0392b"/>
      <rect width="450" height="28" rx="10" fill="#c0392b"/>
      <text x="12" y="20" fill="#fff" font-weight="700">BLOCKER · 34 CFR 99.31(a)(2) — Transfer exception</text>
      <text x="12" y="50" font-weight="700" fill="#444">Before:</text>
      <text x="12" y="68" fill="#333">Plan covers student → employer / grad school</text>
      <text x="12" y="86" fill="#333">disclosure but doesn't address transfers</text>
      <text x="12" y="104" fill="#333">between schools without consent.</text>
      <text x="12" y="130" font-weight="700" fill="#0a7a2c">After (FERPA required):</text>
      <text x="12" y="148" fill="#333">Reasonable-attempt notification flow before</text>
      <text x="12" y="166" fill="#333">disclosing to other institutions per 99.34.</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(20,275)">
      <rect width="450" height="180" rx="10" fill="#fff" stroke="#d97706"/>
      <rect width="450" height="28" rx="10" fill="#d97706"/>
      <text x="12" y="20" fill="#fff" font-weight="700">MAJOR · 34 CFR 99.31(a)(1)(ii) — Authentication</text>
      <text x="12" y="50" font-weight="700" fill="#444">Before:</text>
      <text x="12" y="68" fill="#333">Students authenticate via DID. External</text>
      <text x="12" y="86" fill="#333">verifiers and internal users: auth method</text>
      <text x="12" y="104" fill="#333">not specified.</text>
      <text x="12" y="130" font-weight="700" fill="#0a7a2c">After (FERPA required):</text>
      <text x="12" y="148" fill="#333">OAuth2 / verifier-DID challenge for API; MFA</text>
      <text x="12" y="166" fill="#333">for registrar / advisor access; impersonation guards.</text>
    </g>

    <g transform="translate(485,275)">
      <rect width="450" height="180" rx="10" fill="#fff" stroke="#d97706"/>
      <rect width="450" height="28" rx="10" fill="#d97706"/>
      <text x="12" y="20" fill="#fff" font-weight="700">MAJOR · 34 CFR 99.32 — Disclosure log retention</text>
      <text x="12" y="50" font-weight="700" fill="#444">Before:</text>
      <text x="12" y="68" fill="#333">AuditLogEntry "Permanent" — no tie to record</text>
      <text x="12" y="86" fill="#333">lifecycle.</text>
      <text x="12" y="130" font-weight="700" fill="#0a7a2c">After (FERPA required):</text>
      <text x="12" y="148" fill="#333">Retention = life of education record per 99.32.</text>
      <text x="12" y="166" fill="#333">Student-accessible disclosure history surfaced.</text>
    </g>

    <g transform="translate(950,275)">
      <rect width="450" height="180" rx="10" fill="#fff" stroke="#198754"/>
      <rect width="450" height="28" rx="10" fill="#198754"/>
      <text x="12" y="20" fill="#fff" font-weight="700">INFO · 99.3 + Best practice — what FERPA endorsed</text>
      <text x="12" y="50" font-weight="700" fill="#444">Confirmed correct:</text>
      <text x="12" y="72" fill="#333">✓ Plan correctly scopes student records as</text>
      <text x="12" y="90" fill="#333">  "education records" under 99.3.</text>
      <text x="12" y="112" fill="#333">✓ Hashed IdentityObject + selective disclosure</text>
      <text x="12" y="130" fill="#333">  exceeds FERPA's data-minimization minimum.</text>
      <text x="12" y="156" fill="#666" font-style="italic">FERPA gave the architecture credit before</text>
      <text x="12" y="172" fill="#666" font-style="italic">prescribing the policy/auth fixes above.</text>
    </g>
  </g>
</svg>
